name: Pipeline — Single Task

# For bugs and small features. Describe the task, hit Run, walk away.
# Goes through RED → GREEN → REFACTOR → SECURITY → COMMIT automatically.
# No manifest review step — you've already decided what you want done.

on:
  workflow_dispatch:
    inputs:
      description:
        description: "What to build or fix (be specific — include file paths if you know them)"
        required: true
      phase:
        description: "Phase folder to file this under (default: 0)"
        required: false
        default: "0"

jobs:
  task:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PHASE: ${{ github.event.inputs.phase }}
      TASK_DESCRIPTION: ${{ github.event.inputs.description }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lifeos
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: lifeos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Make scripts executable
        run: chmod +x orchestrator/*.sh

      - name: Run task
        run: ./orchestrator/run-task.sh --phase "$PHASE" --quick "$TASK_DESCRIPTION"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          POSTGRES_USER: lifeos
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: lifeos
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          DATABASE_URL: postgresql://lifeos:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/lifeos

      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "  HALT.md"
          echo "════════════════════════════════════════"
          cat HALT.md 2>/dev/null || echo "(no HALT.md)"
          echo ""
          echo "════════════════════════════════════════"
          echo "  dev-output.md (last agent output)"
          echo "════════════════════════════════════════"
          find pipeline/ -name "dev-output.md" | sort | tail -1 | xargs cat 2>/dev/null || echo "(no dev output)"

      - name: Commit and push results
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            # Truncate description to 72 chars for the commit subject line
            SHORT=$(echo "$TASK_DESCRIPTION" | cut -c1-72)
            git commit -m "fix: ${SHORT} [skip ci]"
            git push
          fi
