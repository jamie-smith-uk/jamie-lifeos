name: PM — Draft PRD
run-name: "PM Draft — #${{ github.event.issue.number }} ${{ github.event.issue.title }}"

# Triggered when an issue is labeled "pm-ready".
# Runs the PM agent to produce or revise a PRD draft, then posts a summary
# comment on the issue with the round number and what changed.
#
# Conversational loop:
#   1. Create a GitHub Issue describing the feature
#   2. Add label "pm-ready" → this workflow runs (Round 1)
#   3. Review the draft in the artifact or in the issue comment
#   4. Reply to the issue with feedback, then re-add "pm-ready" → Round 2
#   5. Repeat until satisfied, then add label "pm-approve"

on:
  issues:
    types: [labeled]

concurrency:
  group: pipeline-pm-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pm-draft:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'pm-ready'

    permissions:
      issues: write
      contents: write

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache opencode-ai
        id: cache-opencode
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: opencode-ai-1.14.48-${{ runner.os }}

      - name: Install opencode
        # PM agent only writes markdown — no project deps needed (C-03 fix)
        if: steps.cache-opencode.outputs.cache-hit != 'true'
        run: npm install -g opencode-ai@1.14.48 --prefix ~/.npm-global

      - name: Add opencode to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Determine round number
        id: round
        run: |
          # Count existing draft files for this issue to determine round
          DRAFTS=$(ls docs/prd-drafts/issue-${ISSUE_NUMBER}-round-*.md 2>/dev/null | wc -l | tr -d ' ')
          ROUND=$(( DRAFTS + 1 ))
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "Round: $ROUND"

      - name: Gather inputs
        id: inputs
        run: |
          mkdir -p docs/prd-drafts

          # Issue body
          gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/issue-body.txt

          # All comments (feedback from previous rounds)
          gh issue view "$ISSUE_NUMBER" --json comments \
            --jq '.comments | map("@" + .author.login + ": " + .body) | join("\n---\n")' \
            > /tmp/issue-comments.txt

          # Existing PRD (may not exist)
          cat docs/prd.md 2>/dev/null > /tmp/existing-prd.txt || echo "" > /tmp/existing-prd.txt

          # Existing architecture (may not exist)
          cat docs/architecture.md 2>/dev/null > /tmp/existing-arch.txt || echo "" > /tmp/existing-arch.txt

          # Previous drafts for this issue (may not exist)
          cat docs/prd-drafts/issue-${ISSUE_NUMBER}-round-*.md 2>/dev/null \
            > /tmp/previous-drafts.txt || echo "" > /tmp/previous-drafts.txt

          echo "Inputs gathered"

      - name: Run PM agent
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          ISSUE_BODY=$(cat /tmp/issue-body.txt)
          ISSUE_COMMENTS=$(cat /tmp/issue-comments.txt)
          EXISTING_PRD=$(cat /tmp/existing-prd.txt)
          EXISTING_ARCH=$(cat /tmp/existing-arch.txt)
          PREVIOUS_DRAFTS=$(cat /tmp/previous-drafts.txt)

          cat > /tmp/pm-prompt.txt << 'PROMPT'
          You are running as AG-PM Product Manager.

          Issue number: ${ISSUE_NUMBER}
          Issue title: ${ISSUE_TITLE}
          Round: ${ROUND}

          <issue-body>
          ${ISSUE_BODY}
          </issue-body>

          <issue-comments>
          ${ISSUE_COMMENTS:-"(no comments yet)"}
          </issue-comments>

          <existing-prd>
          ${EXISTING_PRD:-"(no existing PRD — this is a new product)"}
          </existing-prd>

          <existing-architecture>
          ${EXISTING_ARCH:-"(no existing architecture document)"}
          </existing-architecture>

          <previous-drafts>
          ${PREVIOUS_DRAFTS:-"(no previous drafts — this is round 1)"}
          </previous-drafts>

          Write your draft to: docs/prd-drafts/issue-${ISSUE_NUMBER}-round-${ROUND}.md

          Follow your system prompt exactly. Write the file and halt.
          PROMPT
          PM_PROMPT=$(cat /tmp/pm-prompt.txt)

          opencode run --agent ag-pm "$PM_PROMPT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify draft was written
        id: verify
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          DRAFT="docs/prd-drafts/issue-${ISSUE_NUMBER}-round-${ROUND}.md"
          if [ ! -f "$DRAFT" ]; then
            echo "ERROR: PM agent did not write $DRAFT"
            exit 1
          fi
          echo "draft_path=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "Draft written: $DRAFT"
          wc -l "$DRAFT"

      - name: Commit draft to repo
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/prd-drafts/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "docs(pm): issue #${ISSUE_NUMBER} round ${ROUND} draft"
            git push
          fi

      - name: Extract summary from draft
        id: summary
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          DRAFT="docs/prd-drafts/issue-${ISSUE_NUMBER}-round-${ROUND}.md"

          # Extract "What changed" and "Brief summary" sections for the comment
          WHAT_CHANGED=$(awk '/^## What changed/,/^## /' "$DRAFT" \
            | grep -v "^## " | head -10 | sed '/^$/d')
          BRIEF=$(awk '/^## Brief summary/,/^## /' "$DRAFT" \
            | grep -v "^## " | head -5 | sed '/^$/d')
          PHASES=$(grep "^## Phase" "$DRAFT" | sed 's/^## /- /')

          # Write summary sections to temp files — the Post comment step reads
          # these directly to avoid ${{ }} expression injection (C-07 fix).
          printf '%s' "${WHAT_CHANGED:-Initial draft.}" > /tmp/summary-what-changed.txt
          printf '%s' "${BRIEF}" > /tmp/summary-brief.txt
          printf '%s' "${PHASES:-None listed}" > /tmp/summary-phases.txt

      - name: Post comment on issue
        # Read summary values from files written by the Extract step rather than
        # interpolating ${{ steps.summary.outputs.* }} directly into the run: block.
        # ${{ }} expressions are substituted before shell parsing, so agent output
        # containing backticks or $() would execute as shell commands (C-07 fix).
        env:
          ROUND: ${{ steps.round.outputs.round }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          DRAFT_PATH="docs/prd-drafts/issue-${ISSUE_NUMBER}-round-${ROUND}.md"
          WHAT_CHANGED=$(cat /tmp/summary-what-changed.txt 2>/dev/null || echo "Initial draft.")
          BRIEF=$(cat /tmp/summary-brief.txt 2>/dev/null || echo "")
          PHASES=$(cat /tmp/summary-phases.txt 2>/dev/null || echo "None listed")

          cat > /tmp/comment.txt << 'COMMENT_EOF'
          ## PM Agent — Round ROUND_PLACEHOLDER draft ready
          COMMENT_EOF

          # Build comment body safely using printf to avoid heredoc injection
          {
            printf '## PM Agent — Round %s draft ready\n\n' "$ROUND"
            printf '**What changed**\n%s\n\n' "$WHAT_CHANGED"
            printf '**Summary**\n%s\n\n' "$BRIEF"
            printf '**Phases drafted**\n%s\n\n' "$PHASES"
            printf '**Full draft:** [`%s`](https://github.com/%s/blob/main/%s)\n' \
              "$DRAFT_PATH" "$REPO" "$DRAFT_PATH"
            printf '**Actions run:** %s\n\n' "$RUN_URL"
            printf '---\nTo request changes: reply with your feedback, then re-add the `pm-ready` label.\n'
            printf 'To approve and append to `docs/prd.md`: add the `pm-approve` label.\n'
          } > /tmp/comment.txt

          gh issue comment "$ISSUE_NUMBER" --body "$(cat /tmp/comment.txt)"

      - name: Remove pm-ready label
        if: always()
        run: |
          # Remove the label so re-adding it triggers a fresh run
          gh issue edit "$ISSUE_NUMBER" --remove-label "pm-ready" || true
