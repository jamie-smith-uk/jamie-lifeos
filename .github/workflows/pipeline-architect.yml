name: Pipeline — Architect

# Runs AG-01 + AG-02, commits the pipeline/ output to main, and prints the
# manifest for review. When this completes successfully, review the manifest in
# the job logs then trigger "Pipeline — Implement" for the same phase.

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase number"
        required: true
        default: "1"

concurrency:
  group: pipeline-architect-${{ github.event.inputs.phase }}
  cancel-in-progress: false

jobs:
  architect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PHASE: ${{ github.event.inputs.phase }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lifeos
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: lifeos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache opencode-ai
        id: cache-opencode
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: opencode-ai-1.14.48-${{ runner.os }}

      - name: Install opencode
        if: steps.cache-opencode.outputs.cache-hit != 'true'
        run: npm install -g opencode-ai@1.14.48 --prefix ~/.npm-global

      - name: Add opencode to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Run AG-01 Architect + AG-02 Reviewer
        run: ARCHITECT_ONLY=1 pnpm --filter @lifeos/orchestrator exec tsx src/index.ts --phase "$PHASE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POSTGRES_USER: lifeos
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: lifeos
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          DATABASE_URL: postgresql://lifeos:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/lifeos

      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "  HALT.md"
          echo "════════════════════════════════════════"
          cat HALT.md 2>/dev/null || echo "(no HALT.md)"
          echo ""
          echo "════════════════════════════════════════"
          echo "  schema-errors.txt"
          echo "════════════════════════════════════════"
          cat "pipeline/phase-${PHASE}/schema-errors.txt" 2>/dev/null || echo "(no schema errors file)"
          echo ""
          echo "════════════════════════════════════════"
          echo "  task-manifest.json (raw)"
          echo "════════════════════════════════════════"
          cat "pipeline/phase-${PHASE}/task-manifest.json" 2>/dev/null || echo "(no manifest)"
          echo ""
          echo "════════════════════════════════════════"
          echo "  ag01-output.md (agent stdout)"
          echo "════════════════════════════════════════"
          cat "pipeline/phase-${PHASE}/ag01-output.md" 2>/dev/null || echo "(no agent output)"

      - name: Print manifest for review
        if: success()
        run: |
          echo "════════════════════════════════════════"
          echo "  TASK MANIFEST — Phase ${PHASE}"
          echo "════════════════════════════════════════"
          cat "pipeline/phase-${PHASE}/task-manifest.json" 2>/dev/null || echo "(no manifest found)"
          echo ""
          echo "════════════════════════════════════════"
          echo "  REVIEWER SUMMARY — Phase ${PHASE}"
          echo "════════════════════════════════════════"
          cat "pipeline/phase-${PHASE}/reviewer-summary.md" 2>/dev/null || echo "(no reviewer summary found)"
          echo ""
          echo "────────────────────────────────────────"
          echo "  Review the above then trigger:"
          echo "  Actions → Pipeline — Implement → phase ${PHASE}"
          echo "────────────────────────────────────────"

      - name: Commit pipeline output to repo
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f pipeline/phase-${PHASE}/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(pipeline): phase ${PHASE} architect output [skip ci]"
            git push
          fi
